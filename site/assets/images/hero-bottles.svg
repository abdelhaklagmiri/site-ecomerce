<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#3a2f1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="bottle" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#9a7f48"/>
      <stop offset="50%" stop-color="#e6c787"/>
      <stop offset="100%" stop-color="#9a7f48"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#g1)"/>
  <!-- Big bottle -->
  <g transform="translate(520,180)">
    <rect x="0" y="80" width="220" height="600" rx="14" fill="url(#bottle)" stroke="#c9a96e" stroke-width="2"/>
    <rect x="40" y="0" width="140" height="90" rx="10" fill="url(#gold)"/>
    <rect x="60" y="-30" width="100" height="40" rx="6" fill="#eee"/>
    <rect x="20" y="220" width="180" height="260" rx="6" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
    <text x="110" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="44" fill="#c9a96e" letter-spacing="6">VALON</text>
    <text x="110" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a96e" letter-spacing="4">Hair Care</text>
    <text x="110" y="410" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#c9a96e" letter-spacing="2">SHAMPOOING NATUREL</text>
  </g>
  <!-- Small bottle -->
  <g transform="translate(880,300)">
    <rect x="0" y="60" width="160" height="440" rx="10" fill="url(#bottle)" stroke="#c9a96e" stroke-width="2"/>
    <rect x="35" y="0" width="90" height="70" rx="8" fill="url(#gold)"/>
    <text x="80" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#c9a96e" letter-spacing="4">VALON</text>
    <text x="80" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c9a96e" letter-spacing="3">Hair Care</text>
  </g>
  <!-- Oil drop -->
  <g transform="translate(720,140)">
    <path d="M0,0 C20,40 40,80 0,120 C-40,80 -20,40 0,0" fill="#e6c787" opacity="0.85"/>
  </g>
  <!-- Sparkles -->
  <g fill="#e6c787" opacity="0.6">
    <circle cx="200" cy="200" r="3"/>
    <circle cx="1400" cy="180" r="2"/>
    <circle cx="1300" cy="700" r="3"/>
    <circle cx="220" cy="780" r="2"/>
  </g>
</svg>
